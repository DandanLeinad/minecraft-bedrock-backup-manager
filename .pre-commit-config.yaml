---
default_language_version:
  python: python3.14

default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff
        args:
          [
            "--fix",
            "--show-fixes",
            "--select=E,F,W,I,N,UP,B,A,C4,PIE,SIM,RUF",
            "--ignore=E501,UP009,B904",
          ]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=4000"]
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-json
      - id: check-toml
      - id: check-case-conflict

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [--strict]
        exclude: ^\.github/

  - repo: local
    hooks:
      - id: dco-signed-off-by
        name: DCO — Signed-off-by check (commit-msg)
        language: python
        entry: python scripts/dco_check.py
        stages: [commit-msg]

      - id: validate-license-header
        name: Validate SPDX license header
        language: python
        entry: python scripts/validate_license_header.py
        stages: [pre-commit]
        pass_filenames: true
        types: [python]

      - id: validate-license-header-all
        name: Validate SPDX license header (all files)
        language: python
        entry: python scripts/validate_license_header.py --all
        stages: [pre-push]
        pass_filenames: false
